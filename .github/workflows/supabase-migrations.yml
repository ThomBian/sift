# Applies `supabase/migrations/*` to the linked production database.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF    — project ref (subdomain of *.supabase.co), production only
#   SUPABASE_DB_PASSWORD    — Database password from Supabase → Settings → Database
#
# Optional: duplicate this workflow with different secrets for a staging project.

name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.89.1

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}" \
            --yes
          supabase db push --yes
